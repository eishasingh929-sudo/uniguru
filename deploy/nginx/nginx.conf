user nginx;
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format uniguru_json escape=json
        '{"time":"$time_iso8601","remote_addr":"$remote_addr","request_id":"$request_id","host":"$host","method":"$request_method","uri":"$uri","status":$status,"bytes_sent":$body_bytes_sent,"request_time":$request_time,"upstream_time":"$upstream_response_time","user_agent":"$http_user_agent","forwarded_for":"$http_x_forwarded_for"}';

    access_log /var/log/nginx/access.log uniguru_json;
    error_log /var/log/nginx/error.log warn;

    sendfile on;
    keepalive_timeout 65;
    server_tokens off;

    include /etc/nginx/conf.d/*.conf;
}
