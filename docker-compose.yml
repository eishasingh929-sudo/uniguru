version: "3.9"

services:
  uniguru-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: uniguru-api
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      UNIGURU_HOST: "0.0.0.0"
      UNIGURU_PORT: "8000"
    expose:
      - "8000"
    volumes:
      - uniguru_metrics:/var/lib/uniguru
    networks:
      - uniguru_net

  node-backend:
    build:
      context: ./node-backend
      dockerfile: Dockerfile
    container_name: node-backend
    restart: unless-stopped
    environment:
      NODE_BACKEND_PORT: "8080"
      UNIGURU_ASK_URL: "http://uniguru-api:8000/ask"
      UNIGURU_API_TOKEN: "${UNIGURU_API_TOKEN}"
      UNIGURU_REQUEST_TIMEOUT_MS: "15000"
    depends_on:
      - uniguru-api
    expose:
      - "8080"
    networks:
      - uniguru_net

  nginx:
    image: nginx:1.27-alpine
    container_name: uniguru-nginx
    restart: unless-stopped
    depends_on:
      - uniguru-api
      - node-backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
      - nginx_logs:/var/log/nginx
    networks:
      - uniguru_net

  certbot:
    image: certbot/certbot:latest
    container_name: uniguru-certbot
    restart: unless-stopped
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    entrypoint: /bin/sh -c
    command: "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h; done"

volumes:
  certbot_www:
  certbot_conf:
  nginx_logs:
  uniguru_metrics:

networks:
  uniguru_net:
    driver: bridge
